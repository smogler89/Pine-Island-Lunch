name: Publish school calendars

on:
  schedule:
    - cron: "0 20 * * *"  # Runs every day at 20:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Generate Lunch Calendars
      - name: Generate Lunch Calendars
        run: |
          python generate_ics.py \
            --district "${{ vars.NUTRISLICE_DISTRICT || 'a2schools' }}" \
            --menu-type lunch \
            --days-ahead "${{ vars.NUTRISLICE_DAYS_AHEAD || '28' }}" \
            --output-dir public/lunch

      # 5. Generate Breakfast Calendars
      - name: Generate Breakfast Calendars
        run: |
          python generate_ics.py \
            --district "${{ vars.NUTRISLICE_DISTRICT || 'a2schools' }}" \
            --menu-type breakfast \
            --days-ahead "${{ vars.NUTRISLICE_DAYS_AHEAD || '28' }}" \
            --output-dir public/breakfast

      # 6. Create Combined Homepage
      - name: Create Combined Homepage
        run: |
          echo "Generating combined homepage..."

          # Merge breakfast and lunch manifests
          SCHOOLS=$(jq -s '[.[0].schools, .[1].schools] | add | unique_by(.slug) | .[] | "\(.slug)|\(.name)"' public/lunch/manifest.json public/breakfast/manifest.json)

          cat << 'EOF' > public/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Pine Island School Menu Calendars</title>
            <style>
              body { font-family: system-ui, -apple-system, sans-serif; background: #f3f4f6; margin: 0; padding: 48px 20px; }
              h1 { text-align: center; margin-bottom: 16px; }
              p { text-align: center; color: #4b5563; font-size: 1rem; }
              .instructions { max-width: 720px; margin: 16px auto; color: #4b5563; font-size: 0.95rem; }
              .instructions ul { margin: 8px 0 0; padding-left: 20px; }
              .instructions li { margin-bottom: 6px; }
              .container { max-width: 900px; margin: 32px auto 0; display: grid; gap: 20px; }
              .school { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
              .links { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
              .row { display: flex; gap: 12px; flex-wrap: wrap; }
              button, a { display: inline-flex; align-items: center; justify-content: center; padding: 10px 18px; border-radius: 999px; font-weight: 600; font-size: 0.9rem; text-decoration: none; cursor: pointer; position: relative; }
              a { background: #1d4ed8; color: white; }
              button { background: #e5e7eb; color: #1f2937; border: none; }
              a:hover { background: #1e40af; }
              button:hover { background: #d1d5db; }
              .tooltip {
                position: absolute;
                top: -28px;
                left: 50%;
                transform: translateX(-50%);
                background: #111827;
                color: white;
                font-size: 0.75rem;
                padding: 2px 8px;
                border-radius: 4px;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.2s;
              }
              .tooltip.show { opacity: 1; }
            </style>
          </head>
          <body>
            <h1>Pine Island School Menu Calendars</h1>
            <p>
              Subscribe once and your calendar will update automatically with the latest
              breakfast and lunch menus. Use the buttons below for the direct ICS link or a
              webcal:// subscription.
            </p>
            <div class="instructions">
              <strong>Quick tips:</strong>
              <ul>
                <li>To add this to Google Calendar, click the + next to “Other calendars” and paste the ICS link.</li>
                <li>Use the copy button to grab an ICS link to share or add in other calendar apps.</li>
              </ul>
            </div>
            <div class="container">
          EOF

          # Append each school dynamically
          while IFS="|" read -r slug name; do
            name="${name%\"}"  # remove trailing quotes
            cat << EOF >> public/index.html
              <div class="school" data-slug="${slug}" data-name="${name}">
                <h2>${name}</h2>
                <div class="links">
                  <div class="row">
                    <a href="webcal://$(echo "${GITHUB_REPOSITORY}.github.io")/breakfast/${slug}.ics">🍳 Subscribe Breakfast</a>
                    <a href="./breakfast/${slug}.ics" target="_blank">Breakfast ICS</a>
                    <button data-menu="breakfast">Copy Breakfast ICS
                      <span class="tooltip">Copied!</span>
                    </button>
                  </div>
                  <div class="row">
                    <a href="webcal://$(echo "${GITHUB_REPOSITORY}.github.io")/lunch/${slug}.ics">🥪 Subscribe Lunch</a>
                    <a href="./lunch/${slug}.ics" target="_blank">Lunch ICS</a>
                    <button data-menu="lunch">Copy Lunch ICS
                      <span class="tooltip">Copied!</span>
                    </button>
                  </div>
                </div>
              </div>
          EOF
          done <<< "$SCHOOLS"

          cat << 'EOF' >> public/index.html
            </div>
            <script>
              const buttons = document.querySelectorAll("button[data-menu]");
              buttons.forEach(btn => {
                btn.addEventListener("click", async () => {
                  const school = btn.closest(".school").dataset.slug;
                  const menu = btn.dataset.menu;
                  const url = `./${menu}/${school}.ics`;
                  try {
                    await navigator.clipboard.writeText(url);
                    const tooltip = btn.querySelector(".tooltip");
                    tooltip.classList.add("show");
                    setTimeout(() => { tooltip.classList.remove("show"); }, 1500);
                  } catch {
                    alert("Copy failed");
                  }
                });
              });
            </script>
          </body>
          </html>
          EOF

      # 7. Publish to GitHub Pages
      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
