name: Publish school calendars

on:
  schedule:
    - cron: "0 20 * * *"  # Runs every day at 20:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Generate Lunch Calendars
      - name: Generate Lunch Calendars
        run: |
          python generate_ics.py \
            --district "${{ vars.NUTRISLICE_DISTRICT || 'a2schools' }}" \
            --menu-type lunch \
            --days-ahead "${{ vars.NUTRISLICE_DAYS_AHEAD || '28' }}" \
            --output-dir public/lunch

      # 5. Generate Breakfast Calendars
      - name: Generate Breakfast Calendars
        run: |
          python generate_ics.py \
            --district "${{ vars.NUTRISLICE_DISTRICT || 'a2schools' }}" \
            --menu-type breakfast \
            --days-ahead "${{ vars.NUTRISLICE_DAYS_AHEAD || '28' }}" \
            --output-dir public/breakfast

      # 6. Create Combined Homepage
      - name: Create Combined Homepage
        run: |
          echo "Generating combined homepage..."
          
          # Extract school list from lunch manifest
          SCHOOLS=$(jq -r '.schools[] | "\(.slug)|\(.name)"' public/lunch/manifest.json)

          cat << 'EOF' > public/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>School Menu Calendars</title>
            <style>
              body {
                font-family: system-ui, -apple-system, sans-serif;
                background: #f3f4f6;
                margin: 0;
                padding: 60px 20px;
              }
              h1 {
                text-align: center;
                margin-bottom: 50px;
              }
              .container {
                max-width: 900px;
                margin: auto;
                display: grid;
                gap: 20px;
              }
              .school {
                background: white;
                padding: 24px;
                border-radius: 16px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.06);
              }
              .links {
                margin-top: 12px;
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
              }
              a {
                display: inline-block;
                padding: 10px 18px;
                border-radius: 999px;
                background: #1d4ed8;
                color: white;
                text-decoration: none;
                font-weight: 600;
                font-size: 0.9rem;
              }
              a:hover { background: #1e40af; }
            </style>
          </head>
          <body>
            <h1>School Menu Calendars</h1>
            <div class="container">
          EOF

          # Append each school dynamically
          while IFS="|" read -r slug name; do
            cat << EOF >> public/index.html
              <div class="school">
                <h2>${name}</h2>
                <div class="links">
                  <a href="./breakfast/${slug}.ics" target="_blank">🍳 Breakfast ICS</a>
                  <a href="./lunch/${slug}.ics" target="_blank">🥪 Lunch ICS</a>
                </div>
              </div>
          EOF
          done <<< "$SCHOOLS"

          cat << 'EOF' >> public/index.html
            </div>
          </body>
          </html>
          EOF

      # 7. Publish to GitHub Pages
      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
