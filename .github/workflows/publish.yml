name: Publish school calendars

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Lunch Calendars
        run: |
          python generate_ics.py \
            --district "${{ vars.NUTRISLICE_DISTRICT || 'a2schools' }}" \
            --menu-type lunch \
            --days-ahead "${{ vars.NUTRISLICE_DAYS_AHEAD || '28' }}" \
            --output-dir public/lunch

      - name: Generate Breakfast Calendars
        run: |
          python generate_ics.py \
            --district "${{ vars.NUTRISLICE_DISTRICT || 'a2schools' }}" \
            --menu-type breakfast \
            --days-ahead "${{ vars.NUTRISLICE_DAYS_AHEAD || '28' }}" \
            --output-dir public/breakfast

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
